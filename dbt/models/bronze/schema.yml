version: 2

models:
  - name: bronze_orders
    description: "Latest CDC state of each order from Delta Lake bronze layer"
    tests:
      - dbt_utils.recency:
          datepart: hour
          field: created_at
          interval: 4
    columns:
      - name: id
        tests:
          - not_null:
              severity: error
      - name: user_id
        tests:
          - not_null:
              severity: error
      - name: status
        tests:
          - accepted_values:
              values: ['Processing', 'Shipped', 'Delivered', 'Cancelled', 'Returned']
              severity: error

  - name: bronze_order_items
    description: "Latest CDC state of each order item"
    tests:
      - dbt_utils.recency:
          datepart: hour
          field: created_at
          interval: 4
    columns:
      - name: id
        tests:
          - not_null:
              severity: error
      - name: order_id
        tests:
          - not_null:
              severity: error
      - name: product_id
        tests:
          - not_null:
              severity: error
      - name: sale_price
        tests:
          - not_null:
              severity: error

  - name: bronze_events
    description: "Web and app events from CDC"
    tests:
      - dbt_utils.recency:
          datepart: hour
          field: created_at
          interval: 4
    columns:
      - name: id
        tests:
          - not_null:
              severity: error
      - name: event_type
        tests:
          - not_null:
              severity: error
      - name: session_id
        tests:
          - not_null:
              severity: error
