version: 2

sources:
  - name: staging
    description: "Raw Delta Lake staging tables sourced from TheLook PostgreSQL: dynamic tables via Debezium CDC and static reference tables via bootstrap load"
    database: delta
    schema: staging
    loaded_at_field: kafka_timestamp
    freshness:
      warn_after: {count: 1, period: hour}
      error_after: {count: 6, period: hour}
    tables:
      - name: orders
        description: "CDC events for orders (includes status updates)"
      - name: order_items
        description: "CDC events for order line items"
      - name: events
        description: "Web/app behavioral events"
      - name: users
        description: "Customer profiles"
      - name: products
        description: "Product catalog bootstrapped from PostgreSQL into bronze Delta"
        freshness: null  # static reference data, skip freshness
      - name: dist_centers
        description: "Distribution center locations bootstrapped from PostgreSQL into bronze Delta"
        freshness: null  # static reference data, skip freshness
