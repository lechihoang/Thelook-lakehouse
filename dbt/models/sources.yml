version: 2

sources:
  - name: bronze
    description: "Raw Delta Lake tables ingested via Debezium CDC from TheLook E-commerce PostgreSQL"
    database: delta
    schema: bronze
    loaded_at_field: kafka_timestamp
    freshness:
      warn_after: {count: 1, period: hour}
      error_after: {count: 6, period: hour}
    tables:
      - name: orders
        description: "CDC events for orders (includes status updates)"
      - name: order_items
        description: "CDC events for order line items"
      - name: events
        description: "Web/app behavioral events"
      - name: users
        description: "Customer profiles"
      - name: products
        description: "Product catalog (loaded from CSV)"
        freshness: null  # static reference data, skip freshness
      - name: dist_centers
        description: "Distribution center locations"
        freshness: null  # static reference data, skip freshness
