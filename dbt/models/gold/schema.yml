version: 2

models:
  - name: gold_sales_by_category
    description: "Revenue and margin aggregated by product category, department and brand"
    columns:
      - name: product_category
        tests:
          - not_null:
              severity: error
      - name: product_department
        tests:
          - not_null:
              severity: error
      - name: total_orders
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 1000000
              severity: error
      - name: total_revenue
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100000000
              severity: error
      - name: margin_pct
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100
              severity: error

  - name: gold_order_funnel
    description: "Order volume and timing by status (Processing → Shipped → Delivered → Returned/Cancelled)"
    columns:
      - name: order_status
        tests:
          - not_null:
              severity: error
          - accepted_values:
              values: ['Processing', 'Shipped', 'Delivered', 'Cancelled', 'Returned']
              severity: error
      - name: total_orders
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 1000000
              severity: error

  - name: gold_customer_segments
    description: "Customer purchase behavior by demographics (country, gender, age, traffic source)"
    columns:
      - name: country
        tests:
          - not_null:
              severity: error
      - name: gender
        tests:
          - accepted_values:
              values: ['M', 'F', 'Other']
              severity: error
      - name: total_customers
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 1000000
              severity: error
      - name: total_revenue
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100000000
              severity: error

  - name: gold_product_performance
    description: "Product-level revenue, return rate, and cancel rate"
    columns:
      - name: product_id
        tests:
          - not_null:
              severity: error
      - name: product_name
        tests:
          - not_null:
              severity: error
      - name: total_revenue
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 10000000
              severity: error
      - name: return_rate
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100
              severity: error
      - name: cancel_rate
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100
              severity: error
