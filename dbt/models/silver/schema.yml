version: 2

models:
  - name: silver_order_items
    description: "Order items enriched with product, order, user, and distribution center info"
    columns:
      - name: order_item_id
        tests:
          - not_null:
              severity: error
          - unique:
              severity: error
      - name: order_id
        tests:
          - not_null:
              severity: error
      - name: product_id
        tests:
          - not_null:
              severity: error
      - name: revenue
        tests:
          - not_null:
              severity: error
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100000
      - name: customer_country
        tests:
          - not_null:
              severity: warn
      - name: distribution_center
        tests:
          - not_null:
              severity: warn

  - name: silver_orders
    description: "Orders enriched with user info and timing metrics"
    columns:
      - name: order_id
        tests:
          - not_null:
              severity: error
          - unique:
              severity: error
      - name: user_id
        tests:
          - not_null:
              severity: error
      - name: order_status
        tests:
          - not_null:
              severity: error
          - accepted_values:
              values: ['Processing', 'Shipped', 'Delivered', 'Cancelled', 'Returned']
              severity: error
      - name: customer_name
        tests:
          - not_null:
              severity: error

  - name: silver_events
    description: "Web/app events enriched with user info"
    columns:
      - name: event_id
        tests:
          - not_null:
              severity: error
          - unique:
              severity: error
      - name: event_type
        tests:
          - not_null:
              severity: error
      - name: session_id
        tests:
          - not_null:
              severity: error
      - name: browser
        tests:
          - not_null:
              severity: error
