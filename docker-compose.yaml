version: "3.9"

x-airflow-common: &airflow-common
  build:
    context: ./infra/airflow
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow123@airflow-db:5432/airflow
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_API_SECRET_KEY:-changeme}
    AIRFLOW_CONFIG: '/opt/airflow/config/airflow.cfg'
    MINIO_ROOT_USER: ${MINIO_ROOT_USER}
    MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    S3_ACCESS_KEY: ${MINIO_ROOT_USER}
    S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    S3_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
    SPARK_HOME: /opt/spark
    SPARK_JARS_DIR: /opt/spark/jars
    AWS_JAVA_V1_DISABLE_DEPRECATION_ANNOUNCEMENT: "true"
  volumes:
    - ./infra/airflow/dags:/opt/airflow/dags
    - ./infra/airflow/logs:/opt/airflow/logs
    - ./infra/dbt:/opt/airflow/dbt
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    airflow-db:
      condition: service_healthy

services:
  # ─── PostgreSQL (CDC source) ─────────────────────────────
  postgres:
    image: postgres:15
    container_name: thelook-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_CDC_USER: ${POSTGRES_CDC_USER:-cdc_reader}
      POSTGRES_CDC_PASSWORD: ${POSTGRES_CDC_PASSWORD:-cdc_reader_pwd}
    command: >
      postgres
      -c wal_level=logical
      -c max_replication_slots=4
      -c max_wal_senders=4
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: [core]

  # ─── MinIO (S3-compatible object storage) ─────────────────
  minio:
    image: minio/minio:latest
    container_name: thelook-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - data_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: [core]

  # ─── MinIO bucket init ────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: thelook-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing myminio/${MINIO_BUCKET};
        mc mb --ignore-existing myminio/iceberg;
        echo 'Buckets created.';
      "
    networks:
      - data_network
    profiles: [core]

  # ─── MariaDB (Hive Metastore backend) ─────────────────────
  mariadb:
    image: mariadb:10.5.16
    container_name: thelook-mariadb
    environment:
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MARIADB_DATABASE}
      MYSQL_USER: ${MARIADB_USER}
      MYSQL_PASSWORD: ${MARIADB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - data_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MARIADB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: [core]

  # ─── Hive Metastore ───────────────────────────────────────
  hive-metastore:
    build:
      context: ./infra/hive-metastore
    container_name: thelook-hive-metastore
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      METASTORE_DB_HOSTNAME: mariadb
      DB_DRIVER: mysql
    ports:
      - "9083:9083"
    networks:
      - data_network
    profiles: [core]

  # ─── Kafka ────────────────────────────────────────────────
  kafka:
    build:
      context: ./infra/kafka
    container_name: thelook-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/bitnami/kafka
    networks:
      - data_network
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    profiles: [core]

  # ─── Schema Registry ──────────────────────────────────────
  schema-registry:
    build:
      context: ./infra/schema-registry
    container_name: thelook-schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    networks:
      - data_network
    profiles: [core]

  # ─── Debezium ─────────────────────────────────────────────
  debezium:
    build:
      context: ./infra/debezium
    container_name: thelook-debezium
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: debezium-thelook
      CONFIG_STORAGE_TOPIC: _debezium-config
      OFFSET_STORAGE_TOPIC: _debezium-offset
      STATUS_STORAGE_TOPIC: _debezium-status
    networks:
      - data_network
    profiles: [core]

  # ─── Spark Master ──────────────────────────────────────────
  spark-master:
    build:
      context: ./infra/spark
    container_name: thelook-spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
      - SPARK_PUBLIC_DNS=localhost
      - AWS_REGION=us-east-1
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - AWS_JAVA_V1_DISABLE_DEPRECATION_ANNOUNCEMENT=true
    ports:
      - "7077:7077"
      - "8088:8080"
    extra_hosts:
      - "localhost:host-gateway"
    networks:
      - data_network
    depends_on:
      minio:
        condition: service_healthy
      hive-metastore:
        condition: service_started
      kafka:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    profiles: [core]

  # ─── Spark Worker ─────────────────────────────────────────
  spark-worker:
    build:
      context: ./infra/spark
    container_name: thelook-spark-worker
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_PUBLIC_DNS=localhost
      - SPARK_WORKER_WEBUI_PORT=8081
      - AWS_REGION=us-east-1
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - AWS_JAVA_V1_DISABLE_DEPRECATION_ANNOUNCEMENT=true
    ports:
      - "8091:8081"
    extra_hosts:
      - "localhost:host-gateway"
    networks:
      - data_network
    depends_on:
      spark-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://spark-master:8080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    profiles: [core]

  # ─── Trino ────────────────────────────────────────────────
  trino:
    build:
      context: ./infra/trino
    container_name: thelook-trino
    ports:
      - "8080:8080"
    volumes:
      - ./infra/trino/conf:/etc/trino
      - trino-data:/var/trino/data
    user: "0:0"
    depends_on:
      - hive-metastore
      - minio
    networks:
      - data_network
    restart: unless-stopped
    profiles: [core]

  # ─── Superset ─────────────────────────────────────────────
  superset:
    build:
      context: ./infra/superset
    container_name: thelook-superset
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SUPERSET_ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME}
      SUPERSET_ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD}
    ports:
      - "8089:8088"
    volumes:
      - ./infra/superset/conf/superset_config.py:/app/pythonpath/superset_config.py:ro
    networks:
      - data_network
    profiles: [core]

  # ─── JupyterLab ───────────────────────────────────────────
  jupyter-lab:
    build:
      context: ./infra/jupyter-lab
    container_name: thelook-jupyter
    ports:
      - "8888:8888"
    volumes:
      - ./workspace:/home/jovyan/work
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SCHEMA_REGISTRY_URL=http://schema-registry:8081
      - SPARK_MASTER_URL=spark://spark-master:7077
      - TRINO_URL=http://trino:8080
    networks:
      - data_network
    profiles: [explore]

  # ─── Data Generator ───────────────────────────────────────
  data-generator:
    build:
      context: ./infra/data-generator
    container_name: thelook-generator
    environment:
      PG_DSN: host=postgres port=5432 dbname=${POSTGRES_DB} user=${POSTGRES_USER} password=${POSTGRES_PASSWORD}
      KAFKA_BOOTSTRAP: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_started
    restart: unless-stopped
    networks:
      - data_network
    profiles: [datagen]

  # ═══════════════════════════════════════════════════════════
  #  AIRFLOW
  # ═══════════════════════════════════════════════════════════
  airflow-db:
    image: postgres:15
    container_name: thelook-airflow-db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow123
      POSTGRES_DB: airflow
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data_network
    restart: unless-stopped
    profiles: [airflow]

  airflow-init:
    <<: *airflow-common
    container_name: thelook-airflow-init
    entrypoint:
      - bash
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username "$${AIRFLOW_ADMIN_USER}" \
          --password "$${AIRFLOW_ADMIN_PASSWORD}" \
          --firstname Admin --lastname User --role Admin \
          --email "$${AIRFLOW_ADMIN_EMAIL}" 2>/dev/null || true
        dbt deps --project-dir /opt/airflow/dbt --profiles-dir /opt/airflow/dbt || true
    depends_on:
      airflow-db:
        condition: service_healthy
    restart: on-failure
    profiles: [airflow]

  airflow-scheduler:
    <<: *airflow-common
    container_name: thelook-airflow-scheduler
    command: scheduler
    depends_on:
      airflow-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped
    profiles: [airflow]

  airflow-webserver:
    <<: *airflow-common
    container_name: thelook-airflow
    command: webserver
    ports:
      - "8085:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped
    profiles: [airflow]

volumes:
  postgres_data:
  minio_data:
  mariadb_data:
  kafka-data:
  trino-data:
  airflow_db_data:
  airflow_logs:

networks:
  data_network:
    driver: bridge
    name: data_network
