version: "3.9"

x-spark-common: &spark-common
  build:
    context: .
    dockerfile: spark/Dockerfile
  volumes:
    - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
  networks:
    - data_network

services:
  # ─── PostgreSQL (TPC-DS source) ─────────────────────────────
  postgres:
    image: postgres:15
    container_name: thelook-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command: >
      postgres
      -c wal_level=logical
      -c max_replication_slots=4
      -c max_wal_senders=4
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO (S3-compatible object storage) ───────────────────
  minio:
    image: minio/minio:latest
    container_name: thelook-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - data_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO bucket init ───────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: thelook-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing myminio/${MINIO_BUCKET};
        echo 'Bucket created.';
      "
    networks:
      - data_network

  # ─── MariaDB (Hive Metastore backend) ───────────────────────
  mariadb:
    image: mariadb:10.5.16
    container_name: thelook-mariadb
    environment:
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MARIADB_DATABASE}
      MYSQL_USER: ${MARIADB_USER}
      MYSQL_PASSWORD: ${MARIADB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - data_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MARIADB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Hive Metastore ─────────────────────────────────────────
  hive-metastore:
    platform: linux/amd64
    build:
      context: hive-metastore
      dockerfile: Dockerfile
    container_name: thelook-hive-metastore
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      METASTORE_DB_HOSTNAME: mariadb
    ports:
      - "9083:9083"
    volumes:
      - ./hive-metastore/metastore-site.xml:/opt/apache-hive-metastore-3.0.0-bin/conf/metastore-site.xml:ro
    networks:
      - data_network

  # ─── Spark Master ────────────────────────────────────────────
  spark-master:
    <<: *spark-common
    container_name: thelook-spark-master
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8080"
    ports:
      - "7077:7077"
      - "8082:8080"

  # ─── Spark Worker ────────────────────────────────────────────
  spark-worker:
    <<: *spark-common
    container_name: thelook-spark-worker
    depends_on:
      - spark-master
    environment:
      SPARK_WORKER_MEMORY: 4g
      SPARK_WORKER_CORES: "4"
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077

  # ─── Spark Thrift Server ─────────────────────────────────────
  spark-thrift-server:
    <<: *spark-common
    container_name: thelook-spark-thrift
    depends_on:
      - spark-master
      - hive-metastore
    volumes:
      - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
      - ./spark/conf/hive-site.xml:/opt/spark/conf/hive-site.xml
    ports:
      - "4041:4040"
      - "10000:10000"
    command:
      - /bin/bash
      - -c
      - >
        sleep 10 &&
        /opt/spark/bin/spark-submit
        --class org.apache.spark.sql.hive.thriftserver.HiveThriftServer2
        --master spark://spark-master:7077
        --total-executor-cores 2
        --executor-memory 1G
        --driver-memory 1G

  # ─── Spark Notebook ──────────────────────────────────────────
  spark-notebook:
    build:
      context: notebook
      dockerfile: Dockerfile
    container_name: thelook-notebook
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      MLFLOW_S3_ENDPOINT_URL: ${MINIO_ENDPOINT}
      JUPYTER_TOKEN: admin123
    ports:
      - "8888:8888"
      - "4040:4040"
    volumes:
      - ./notebook/work:/home/jovyan/work
      - ./notebook/conf/spark-defaults.conf:/usr/local/spark/conf/spark-defaults.conf
    networks:
      - data_network


volumes:
  postgres_data:
  minio_data:
  mariadb_data:

networks:
  data_network:
    driver: bridge
    name: data_network
